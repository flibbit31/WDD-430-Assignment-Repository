<div class="panel panel-default">
    <div class="panel-heading">
        <div class="row">
            <div class="col-xs-12">
                <h2>{{ contact.name }}</h2>
            </div>
        </div>
        <div class="row">
            <div class="col-xs-9">
                <img src="{{ contact.imageUrl }}" alt="{{ contact.name }}" class="img-responsive" style="max-height: 50px;">
            </div>
            <div class="col-xs-3">
                <a class="btn btn-primary" routerLink="edit">Edit</a>
                <a class="btn btn-danger" (click)="onDelete()">Delete</a>
            </div>
        </div>
    </div>
    <div class="panel-body">
        <div>
            <span><strong>Email: </strong></span>
            <p>{{ contact.email }}</p>
        </div>
        <div>
            <span><strong>Phone: </strong></span>
            <p>{{ contact.phone }}</p>
        </div>
    </div>
</div>
